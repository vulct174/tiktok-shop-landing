<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8F9FF"/>
      <stop offset="100%" stop-color="#EEF1FF"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Floor shadow -->
  <ellipse cx="400" cy="600" rx="110" ry="16" fill="#D8D8D8" opacity="0.5"/>
  <!-- Tower body -->
  <rect x="340" y="200" width="120" height="400" rx="60" fill="#F0F0F0" stroke="#DDD" stroke-width="2"/>
  <!-- Inner body detail -->
  <rect x="350" y="210" width="100" height="380" rx="50" fill="#FAFAFA"/>
  <!-- Top air outlet grille -->
  <ellipse cx="400" cy="220" rx="40" ry="20" fill="#E8E8E8"/>
  <line x1="380" y1="215" x2="380" y2="225" stroke="#CCC" stroke-width="1.5"/>
  <line x1="390" y1="213" x2="390" y2="227" stroke="#CCC" stroke-width="1.5"/>
  <line x1="400" y1="212" x2="400" y2="228" stroke="#CCC" stroke-width="1.5"/>
  <line x1="410" y1="213" x2="410" y2="227" stroke="#CCC" stroke-width="1.5"/>
  <line x1="420" y1="215" x2="420" y2="225" stroke="#CCC" stroke-width="1.5"/>
  <!-- Air quality indicator ring -->
  <circle cx="400" cy="320" r="25" fill="none" stroke="#4CAF50" stroke-width="4" opacity="0.7"/>
  <circle cx="400" cy="320" r="18" fill="#4CAF50" opacity="0.15"/>
  <!-- Display panel -->
  <rect x="370" y="370" width="60" height="40" rx="6" fill="#111"/>
  <text x="400" y="395" font-family="Arial, sans-serif" font-size="14" fill="#4FC3F7" text-anchor="middle" font-weight="bold">PM2.5</text>
  <text x="400" y="406" font-family="Arial, sans-serif" font-size="9" fill="#4CAF50" text-anchor="middle">GOOD</text>
  <!-- Side air intake slots -->
  <rect x="345" y="440" width="4" height="100" rx="2" fill="#DDD"/>
  <rect x="345" y="450" width="4" height="15" rx="2" fill="#CCC"/>
  <rect x="345" y="475" width="4" height="15" rx="2" fill="#CCC"/>
  <rect x="345" y="500" width="4" height="15" rx="2" fill="#CCC"/>
  <rect x="345" y="525" width="4" height="15" rx="2" fill="#CCC"/>
  <rect x="451" y="440" width="4" height="100" rx="2" fill="#DDD"/>
  <rect x="451" y="450" width="4" height="15" rx="2" fill="#CCC"/>
  <rect x="451" y="475" width="4" height="15" rx="2" fill="#CCC"/>
  <rect x="451" y="500" width="4" height="15" rx="2" fill="#CCC"/>
  <rect x="451" y="525" width="4" height="15" rx="2" fill="#CCC"/>
  <!-- UV indicator -->
  <circle cx="400" cy="280" r="6" fill="#7C4DFF" opacity="0.8"/>
  <circle cx="400" cy="280" r="10" fill="none" stroke="#7C4DFF" stroke-width="1.5" opacity="0.4"/>
  <!-- Airflow arrows -->
  <path d="M300 350 Q320 340 300 320" fill="none" stroke="#FE2C55" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <path d="M290 380 Q310 370 290 350" fill="none" stroke="#FE2C55" stroke-width="2" opacity="0.25" stroke-linecap="round"/>
  <path d="M500 350 Q480 340 500 320" fill="none" stroke="#FE2C55" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <path d="M510 380 Q490 370 510 350" fill="none" stroke="#FE2C55" stroke-width="2" opacity="0.25" stroke-linecap="round"/>
  <!-- Accent badge -->
  <rect x="530" y="155" width="130" height="34" rx="17" fill="#FE2C55"/>
  <text x="595" y="177" font-family="Arial, sans-serif" font-size="13" fill="#FFF" text-anchor="middle" font-weight="bold">HEPA H13</text>
</svg>
