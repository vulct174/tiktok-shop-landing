<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="description" content="{{META_DESCRIPTION}}">
  <meta property="og:title" content="{{OG_TITLE}}">
  <meta property="og:description" content="{{OG_DESCRIPTION}}">
  <meta property="og:image" content="{{OG_IMAGE}}">
  <meta property="og:type" content="product">
  <title>{{PAGE_TITLE}}</title>
  <!-- LCP preload: first hero image -->
  {{PRELOAD_LCP}}
  <link rel="stylesheet" href="styles.css">
  <!-- TRACKING_HEAD -->
</head>
<body>
  <!-- TRACKING_BODY_NOSCRIPT -->

  <div class="page-wrapper">

    <!-- ═══════════════════════════════════════════════════════
         SECTION 1: Sticky Top Navigation
         ═══════════════════════════════════════════════════════ -->
    <!-- SECTION_TOP_NAV -->

    <!-- ═══════════════════════════════════════════════════════
         SECTION 2: Hero Swipe Carousel
         ═══════════════════════════════════════════════════════ -->
    <!-- SECTION_HERO_CAROUSEL -->

    <!-- ═══════════════════════════════════════════════════════
         SECTION 3: Price + Title Block
         ═══════════════════════════════════════════════════════ -->
    <!-- SECTION_PRICE_TITLE -->

    <!-- ═══════════════════════════════════════════════════════
         SECTION 4: Select Options Row + Variant Modal
         ═══════════════════════════════════════════════════════ -->
    <!-- SECTION_SELECT_OPTIONS -->

    <!-- ═══════════════════════════════════════════════════════
         SECTION 5: Customer Reviews
         ═══════════════════════════════════════════════════════ -->
    <!-- SECTION_REVIEWS -->

    <!-- ═══════════════════════════════════════════════════════
         SECTION 6: About This Product (collapsible)
         ═══════════════════════════════════════════════════════ -->
    <!-- SECTION_ABOUT -->

    <!-- ═══════════════════════════════════════════════════════
         SECTION 7: Hashtags
         ═══════════════════════════════════════════════════════ -->
    <!-- SECTION_HASHTAGS -->

    <!-- ═══════════════════════════════════════════════════════
         SECTION 8: Explore More from Seller (shelf)
         ═══════════════════════════════════════════════════════ -->
    <!-- SECTION_SELLER_SHELF -->

    <!-- ═══════════════════════════════════════════════════════
         SECTION 9: You May Also Like (2-column grid)
         ═══════════════════════════════════════════════════════ -->
    <!-- SECTION_ALSO_LIKE -->

    <!-- ═══════════════════════════════════════════════════════
         SECTION 10: Breadcrumb
         ═══════════════════════════════════════════════════════ -->
    <!-- SECTION_BREADCRUMB -->

    <!-- ═══════════════════════════════════════════════════════
         SECTION 11: Accordion Footer
         ═══════════════════════════════════════════════════════ -->
    <!-- SECTION_FOOTER -->

    <!-- ═══════════════════════════════════════════════════════
         SECTION 12: Sticky Bottom CTA
         ═══════════════════════════════════════════════════════ -->
    <!-- SECTION_STICKY_CTA -->

  </div><!-- /.page-wrapper -->

  <!-- ═══════════════════════════════════════════════════════
       SECTION 13: Checkout Sheets (portalled outside .page-wrapper)
       ═══════════════════════════════════════════════════════ -->
  <!-- SECTION_CHECKOUT -->

  <!-- Inline product data for JS tracking -->
  <script>
    window.__PRODUCT__ = {{PRODUCT_JSON}};
    window.__CHECKOUT_CONFIG__ = {{CHECKOUT_CONFIG_JSON}};
    window.__ADMIN_CONFIG__ = {{ADMIN_CONFIG_JSON}};
  </script>
  <script src="main.js" defer></script>
</body>
</html>
